<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
  <!-- heartbeat / pulse line -->
  <path d="M64 268 H168 L204 168 L264 348 L300 244 L324 268 H448"
        fill="none" stroke="url(#pulse)" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="448" cy="268" r="15" fill="#38bdf8" filter="url(#glow)"/>
</svg>
