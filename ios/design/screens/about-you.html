<body class="bg-surface text-on-surface h-screen flex flex-col antialiased">
<!-- TopAppBar (Transactional - Close/Back only, no full nav) -->

<div class="font-headline text-headline text-text-primary text-center flex-1">
            Demographics

</header>
<!-- Progress Indicator -->

<div class="flex items-center justify-between font-footnote text-footnote text-text-secondary mb-xs">

<span>33%</span>
</div>
<div class="w-full bg-surface-variant rounded-full h-[4px] overflow-hidden">

</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-horizontal py-lg flex flex-col gap-xl">
<div class="text-center">
<h1 class="font-title-2-mobile text-title-2-mobile text-text-primary mb-xs">Let's set your baseline</h1>
<p class="font-body text-body text-text-secondary">This helps us tailor your clinical insights and standard ranges.</p>

<!-- Date of Birth -->

<label class="font-body text-body text-text-primary shrink-0 mr-md" for="dob">Date of Birth</label>
<div class="flex-1 flex justify-end items-center">
<input class="ios-input font-body text-body bg-transparent text-right w-full" id="dob" placeholder="DD/MM/YYYY" type="date"/>
</div>
</div>
<!-- Biological Sex -->
<div class="flex items-center justify-between min-h-touch-target px-md py-sm border-b border-clinical-band">
<label class="font-body text-body text-text-primary shrink-0 mr-md" for="sex">Biological Sex</label>
<div class="flex-1 flex justify-end">
<select %238e8e93\"="" 0="" 24="" 24\"="" class="ios-input font-body text-body bg-transparent text-right w-full appearance-none pr-6 cursor-pointer" height='\"24\"' id="sex" style="background-image: url('data:image/svg+xml;utf8,&lt;svg fill=\" viewbox='\"0' width='\"24\"' xmlns='\"http://www.w3.org/2000/svg\"'>'); background-repeat: no-repeat; background-position-x: 100%; background-position-y: center;"&gt;
                        <option disabled="" selected="" value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="intersex">Intersex / Other</option>
</select>

<!-- Height -->
<div class="flex items-center justify-between min-h-touch-target px-md py-sm border-b border-clinical-band">

<div class="flex-1 flex justify-end items-center gap-xs">
<input class="ios-input font-body text-body w-20" id="height" oninput="calculateBMI()" placeholder="0" type="number"/>
<span class="font-body text-body text-text-tertiary">cm</span>
</div>
</div>

<input class="ios-input font-body text-body w-20" id="weight" oninput="calculateBMI()" placeholder="0" step="0.1" type="number"/>
<span class="font-body text-body text-text-tertiary">kg</span>
</div>
</div>

<span class="font-title-2-mobile text-title-2-mobile text-text-primary" id="bmi-value">--</span>
</div>
<div class="px-sm py-xs rounded-full font-caption-2 text-caption-2 bg-surface-variant text-text-secondary border border-clinical-band" id="bmi-status">
                Awaiting input
            </div>
</div>

<div class="flex justify-center mt-auto pb-sm">

            Continue
        </button>
<button class="w-full min-h-[30px] text-text-secondary font-callout text-callout flex items-center justify-center active:text-text-primary transition-colors">
            Skip for now
        </button>
</footer>
<script>
        function calculateBMI() {
            const heightInput = document.getElementById('height').value;
            const weightInput = document.getElementById('weight').value;
            const bmiContainer = document.getElementById('bmi-container');
            const bmiValueDisplay = document.getElementById('bmi-value');
            const bmiStatusDisplay = document.getElementById('bmi-status');

            if (heightInput && weightInput && heightInput > 0 && weightInput > 0) {
                // Height in meters
                const heightM = heightInput / 100;
                const bmi = weightInput / (heightM * heightM);
                const roundedBmi = bmi.toFixed(1);

                bmiValueDisplay.textContent = roundedBmi;
                
                // Show container with animation
                bmiContainer.classList.remove('hidden');
                // slight delay to allow display:block to apply before animating opacity
                setTimeout(() => {
                    bmiContainer.classList.remove('opacity-0', 'translate-y-2');
                    bmiContainer.classList.add('opacity-100', 'translate-y-0');
                }, 10);

                // Determine Status Zone (Simplified clinical zones)
                let statusClass = "bg-surface-variant text-text-secondary";
                let statusText = "Pending";
                
                if (bmi < 18.5) {
                    statusClass = "bg-[#fef7e0] text-[#b08d00] border-[#fde293]"; // Yellow-ish warning
                    statusText = "Underweight";
                } else if (bmi >= 18.5 && bmi < 25) {
                    statusClass = "bg-optimal-fill text-on-secondary-container border-optimal-border"; // Green optimal
                    statusText = "Optimal Range";
                } else if (bmi >= 25 && bmi < 30) {
                    statusClass = "bg-[#fef7e0] text-[#b08d00] border-[#fde293]"; // Yellow-ish warning
                    statusText = "Overweight";
                } else {
                    statusClass = "bg-error-container text-on-error-container border-[#ffb4ab]"; // Red clinical
                    statusText = "Obesity";
                }

                bmiStatusDisplay.className = `px-sm py-xs rounded-full font-caption-2 text-caption-2 border transition-colors duration-300 ${statusClass}`;
                bmiStatusDisplay.textContent = statusText;

            } else {
                // Hide if invalid
                bmiContainer.classList.remove('opacity-100', 'translate-y-0');
                bmiContainer.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => {
                    if (bmiContainer.classList.contains('opacity-0')) {
                        bmiContainer.classList.add('hidden');
                    }
                }, 300);
            }
        }
    </script>
