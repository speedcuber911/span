<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A73E8"/>
      <stop offset="1" stop-color="#004FB0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#BFE0FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#00255A" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- App-icon background (full bleed; iOS applies its own rounded mask) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- subtle vignette for depth -->
  <radialGradient id="vig" cx="0.5" cy="0.42" r="0.75">
    <stop offset="0.55" stop-color="#1A73E8" stop-opacity="0"/>
    <stop offset="1" stop-color="#002E6E" stop-opacity="0.45"/>
  </radialGradient>
  <rect width="1024" height="1024" fill="url(#vig)"/>

  <!-- Pulse / longevity trend line: a heartbeat that resolves into a rising trend
       ending in an integrated chevron. Reads as 'health signal trending up'. -->
  <g filter="url(#soft)" fill="none" stroke="url(#line)" stroke-width="60"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- baseline -> heartbeat spike -> rising line to the tip -->
    <path d="M 196 600
             L 356 600
             L 416 452
             L 506 716
             L 566 548
             L 628 548
             L 812 360"/>
    <!-- chevron arrowhead, sharing the tip (812,360) -->
    <path d="M 690 360 L 812 360 L 812 482"/>
  </g>

  <!-- small health cross dot marking the start of the span (left baseline) -->
  <g fill="#FFFFFF" opacity="0.95">
    <rect x="150" y="586" width="52" height="16" rx="8"/>
    <rect x="168" y="568" width="16" height="52" rx="8"/>
  </g>
</svg>
